# light
set -g status-justify "centre"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg=#4c4f69,bg=#ccd0da"
set -g status-right-style "none"
set -g pane-active-border-style "fg=#d20f39"
set -g status-style "none,bg=#eff1f5"
set -g message-style "fg=#4c4f69,bg=#ccd0da"
set -g pane-border-style "fg=#ccd0da"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none,fg=#d20f39,bg=#eff1f5"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#4c4f69,bg=#eff1f5"
set -g status-left "#[fg=#ffffff,bg=#d20f39] #S #[fg=#d20f39,bg=#ccd0da,nobold,nounderscore,noitalics]#[fg=#4c4f69,bg=#ccd0da] %R #[fg=#ccd0da,bg=#eff1f5,nobold,nounderscore,noitalics]#[fg=#40a02b,bg=#eff1f5] 󰻠 #(~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh) #[fg=#1e66f5,bg=#eff1f5] 󰍛 #(~/.tmux/plugins/tmux-cpu/scripts/ram_percentage.sh) #[fg=#eff1f5,bg=#eff1f5,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#eff1f5,bg=#eff1f5,nobold,nounderscore,noitalics]#[fg=#4c4f69,bg=#eff1f5] #(~/.tmux/plugins/tmux-network-speed/network_speed.sh) #[fg=#ccd0da,bg=#eff1f5,nobold,nounderscore,noitalics]#[fg=#4c4f69,bg=#ccd0da] %a #[fg=#d20f39,bg=#ccd0da,nobold,nounderscore,noitalics]#[fg=#ffffff,bg=#d20f39] #H #{prefix_highlight} "
setw -g window-status-format "#[fg=#eff1f5,bg=#eff1f5,nobold,nounderscore,noitalics]#[fg=#4c4f69] #I  #W #[fg=#eff1f5,bg=#eff1f5,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#eff1f5,bg=#ccd0da,nobold,nounderscore,noitalics]#[fg=#4c4f69,bg=#ccd0da] #I  #W  #F #[fg=#ccd0da,bg=#eff1f5,nobold,nounderscore,noitalics]"
